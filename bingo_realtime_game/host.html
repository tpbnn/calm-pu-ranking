<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>방장용 빙고판</title><link rel="icon" href="./favicon.png" type="image/png"/><style>
:root{--bg:#f6f7fb;--card:#fff;--text:#171923;--muted:#718096;--line:#e2e8f0;--primary:#2563eb;--primary-dark:#1d4ed8;--danger:#dc2626;--success:#16a34a;--gold:#f59e0b}*{box-sizing:border-box}html{overflow-y:scroll}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}.wrap{max-width:1500px;margin:0 auto;padding:28px 24px 60px}.hero{background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;padding:28px;border-radius:24px;margin-bottom:20px;box-shadow:0 18px 40px rgba(37,99,235,.22);min-height:140px;display:flex;flex-direction:column;justify-content:center}.hero h1{margin:0;font-size:24px}.hero p{margin:8px 0 0;font-size:16px;line-height:1.6;opacity:.92}.grid{display:grid;grid-template-columns:340px 1fr 340px;gap:20px;align-items:start}.box{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(15,23,42,.05)}h2{margin:0 0 16px;font-size:20px;line-height:1;font-weight:900}label{display:block;margin:12px 0 8px;font-size:13px;color:#475569;font-weight:900}input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-size:15px;outline:none;font-family:inherit;background:#fff}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.12)}button{border:0;border-radius:14px;padding:12px 14px;font-weight:900;cursor:pointer;font-size:14px;font-family:inherit}.btn-primary{background:var(--primary);color:#fff}.btn-success{background:var(--success);color:#fff}.btn-danger{background:#fee2e2;color:#991b1b}.btn-light{background:#eef2ff;color:#3730a3}.btn-full{width:100%;margin-top:12px}.help{color:var(--muted);font-size:13px;line-height:1.6}.error{color:var(--danger);font-size:13px;margin-top:8px;line-height:1.5}.ok{color:var(--success);font-size:13px;margin-top:8px;line-height:1.5}.board-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}.bingo-board{border:1px solid var(--line);border-radius:20px;padding:14px;background:#fff}.board-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.board-title{font-weight:1000}.bingo-count{padding:6px 10px;border-radius:999px;background:#eff6ff;color:#1e40af;font-size:12px;font-weight:900;white-space:nowrap}.bingo-grid{display:grid;gap:6px}.cell{aspect-ratio:1/1;border:1px solid var(--line);border-radius:10px;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:15px;position:relative;user-select:none}.cell.marked{background:#dbeafe;color:#1e40af;border-color:#93c5fd}.cell.chicken{background:#fef3c7;color:#92400e;border-color:#facc15}.cell.bingo-line{box-shadow:0 0 0 3px rgba(34,197,94,.28);border-color:#22c55e}.cell.chicken-mode{cursor:pointer}.cell.chicken-mode:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(245,158,11,.22)}.history-list{display:flex;flex-direction:column;gap:8px}.history-item{padding:12px;border:1px solid var(--line);border-radius:14px;background:#f8fafc}.history-title{font-weight:900;margin-bottom:4px}.history-meta{color:#64748b;font-size:13px;line-height:1.5}.stat-pill{padding:12px 14px;border-radius:14px;background:#eff6ff;color:#1e40af;font-weight:900;text-align:center;margin-bottom:10px}.copy-box{padding:12px;border-radius:14px;background:#f8fafc;border:1px dashed #cbd5e1;font-size:13px;line-height:1.6;word-break:break-all}.footer{margin-top:8px;padding:28px 20px 40px;text-align:center;color:#94a3b8}.footer-copy{font-size:13px;margin-bottom:2px}.player-wrap{max-width:720px;margin:0 auto;padding:28px 24px 60px}.player-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(15,23,42,.05)}@media(max-width:1100px){.grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><section class="hero"><h1>방장용 빙고판</h1><p>방장이 빙고판을 만들고, 참가자가 자기 기기에서 입력한 숫자를 실시간으로 반영합니다.</p></section><div class="grid"><section class="box"><h2>방 설정</h2><label>방 ID</label><input id="roomId" placeholder="예) 아리송이" autocomplete="off"/><label>숫자 시작</label><input id="minNumber" type="number" value="1" min="1" max="99"/><label>숫자 끝</label><input id="maxNumber" type="number" value="99" min="1" max="99"/><label>빙고판 개수</label><input id="boardCount" type="number" value="3" min="1" max="20"/><label>빙고판 크기</label><select id="boardSize"><option value="5">5 x 5</option><option value="6">6 x 6</option><option value="7">7 x 7</option></select><button class="btn-primary btn-full" onclick="createRoom()">빙고판 생성</button><button class="btn-danger btn-full" onclick="resetRoom()">방 전체 초기화</button><div id="settingMessage" class="error"></div><p class="help">참가자에게 아래 참가자용 주소와 방 ID를 알려주세요.</p><div id="playerLinkBox" class="copy-box">방을 생성하면 참가자용 안내가 표시됩니다.</div></section><section class="box"><h2>빙고판</h2><div id="boardArea" class="board-wrap"><div class="help">아직 생성된 빙고판이 없습니다.</div></div></section><section class="box"><h2>진행 관리</h2><div id="chickenCount" class="stat-pill">치킨 보유 : 0개</div><button class="btn-success btn-full" onclick="addChicken()">치킨 +1</button><button id="chickenModeBtn" class="btn-light btn-full" onclick="toggleChickenMode()">치킨 사용 모드 OFF</button><p class="help">치킨 사용 모드 ON 상태에서 원하는 빙고판 숫자 1개를 클릭하면 해당 숫자가 지워지고 치킨 1개가 차감됩니다.</p><h2 style="margin-top:24px;">입력 기록</h2><div id="historyArea" class="history-list"><div class="help">아직 입력 기록이 없습니다.</div></div></section></div></div><footer class="footer"><div class="footer-copy">© 2026 주니.킨콘. All Rights Reserved.</div></footer><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, set, update, remove, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import { firebaseConfig } from "./firebase-config.js";
const app=initializeApp(firebaseConfig), db=getDatabase(app);let currentRoomId="",roomData=null,chickenMode=false;
function esc(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function makeBoardNumbers(min,max,size){const need=size*size,pool=[];for(let n=min;n<=max;n++)pool.push(n);if(pool.length<need)throw new Error(`${need}개 이상 숫자가 필요합니다.`);shuffle(pool);return pool.slice(0,need).map(num=>({num,marked:false,chicken:false}))}
function roomRef(id){return ref(db,`rooms/${id}`)}
function listenRoom(id){currentRoomId=id;onValue(roomRef(id),s=>{roomData=s.val();renderBoards();renderHistory();renderChicken();if(roomData)renderPlayerLink();})}
window.createRoom=async function(){const msg=document.getElementById('settingMessage');msg.className='error';msg.textContent='';const roomId=document.getElementById('roomId').value.trim(),min=+document.getElementById('minNumber').value,max=+document.getElementById('maxNumber').value,count=+document.getElementById('boardCount').value,size=+document.getElementById('boardSize').value;if(!roomId){msg.textContent='방 ID를 입력해주세요.';return}if(min<1||max>99||min>max){msg.textContent='숫자 범위는 1~99 사이로 입력해주세요.';return}const boards={};try{for(let i=1;i<=count;i++)boards[`board${i}`]={id:`board${i}`,title:`${i}번 빙고판`,cells:makeBoardNumbers(min,max,size)}}catch(e){msg.textContent=e.message;return}await set(roomRef(roomId),{settings:{roomId,min,max,boardCount:count,size,createdAt:Date.now()},chicken:{count:0},boards,submissions:{}});listenRoom(roomId);msg.className='ok';msg.textContent='빙고판 생성 완료!'};
window.resetRoom=async function(){const id=document.getElementById('roomId').value.trim()||currentRoomId;if(!id)return alert('초기화할 방 ID가 없습니다.');if(!confirm('방 전체를 초기화할까요?'))return;await remove(roomRef(id));roomData=null;renderBoards();renderHistory();renderChicken();document.getElementById('playerLinkBox').textContent='방을 생성하면 참가자용 안내가 표시됩니다.'};
window.addChicken=async function(){if(!currentRoomId||!roomData)return alert('먼저 방을 생성해주세요.');await update(ref(db,`rooms/${currentRoomId}/chicken`),{count:(+roomData.chicken?.count||0)+1})};
window.toggleChickenMode=function(){chickenMode=!chickenMode;const b=document.getElementById('chickenModeBtn');b.textContent=chickenMode?'치킨 사용 모드 ON':'치킨 사용 모드 OFF';b.className=chickenMode?'btn-success btn-full':'btn-light btn-full';renderBoards()};
window.useChicken=async function(boardId,idx){if(!chickenMode||!roomData)return;const count=+roomData.chicken?.count||0;if(count<=0)return alert('보유한 치킨이 없습니다.');const cell=roomData.boards[boardId].cells[idx];if(cell.marked||cell.chicken)return alert('이미 처리된 숫자입니다.');const log=push(ref(db,`rooms/${currentRoomId}/submissions`)),u={};u[`rooms/${currentRoomId}/boards/${boardId}/cells/${idx}/chicken`]=true;u[`rooms/${currentRoomId}/chicken/count`]=count-1;u[`rooms/${currentRoomId}/submissions/${log.key}`]={nickname:'방장',boardId,number:cell.num,type:'chicken',createdAt:Date.now()};await update(ref(db),u)};
function renderPlayerLink(){const url=`${location.origin}${location.pathname.replace('host.html','player.html')}`;document.getElementById('playerLinkBox').innerHTML=`참가자용 주소:<br><strong>${esc(url)}</strong><br><br>방 ID:<br><strong>${esc(currentRoomId)}</strong>`}
function lines(cells,size){const m=cells.map(c=>c.marked||c.chicken),out=[];for(let r=0;r<size;r++){const a=[];for(let c=0;c<size;c++)a.push(r*size+c);if(a.every(i=>m[i]))out.push(a)}for(let c=0;c<size;c++){const a=[];for(let r=0;r<size;r++)a.push(r*size+c);if(a.every(i=>m[i]))out.push(a)}const d1=[],d2=[];for(let i=0;i<size;i++){d1.push(i*size+i);d2.push(i*size+(size-1-i))}if(d1.every(i=>m[i]))out.push(d1);if(d2.every(i=>m[i]))out.push(d2);return out}
function renderBoards(){const area=document.getElementById('boardArea');if(!roomData?.boards){area.innerHTML='<div class="help">아직 생성된 빙고판이 없습니다.</div>';return}const size=+roomData.settings.size;area.innerHTML=Object.values(roomData.boards).map(b=>{const l=lines(b.cells,size),set=new Set(l.flat());return `<div class="bingo-board"><div class="board-head"><div class="board-title">${esc(b.title)}</div><div class="bingo-count">${l.length} BINGO</div></div><div class="bingo-grid" style="grid-template-columns:repeat(${size},1fr);">${b.cells.map((cell,i)=>`<div class="cell ${cell.marked?'marked':''} ${cell.chicken?'chicken':''} ${set.has(i)?'bingo-line':''} ${chickenMode?'chicken-mode':''}" onclick="useChicken('${b.id}',${i})">${cell.num}</div>`).join('')}</div></div>`}).join('')}
function renderHistory(){const area=document.getElementById('historyArea');if(!roomData?.submissions){area.innerHTML='<div class="help">아직 입력 기록이 없습니다.</div>';return}area.innerHTML=Object.values(roomData.submissions).sort((a,b)=>b.createdAt-a.createdAt).slice(0,30).map(log=>`<div class="history-item"><div class="history-title">${log.type==='chicken'?'🍗 치킨 사용':'🎯 숫자 입력'} · ${esc(log.nickname||'-')}</div><div class="history-meta">${esc(log.boardId)} · 숫자 ${log.number}<br>${new Date(log.createdAt).toLocaleString('ko-KR')}</div></div>`).join('')}
function renderChicken(){document.getElementById('chickenCount').textContent=`치킨 보유 : ${+roomData?.chicken?.count||0}개`}
document.getElementById('roomId').addEventListener('change',e=>{const id=e.target.value.trim();if(id)listenRoom(id)});
</script></body></html>
