<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>덕몽어스</title>

  <link rel="icon" href="./favicon.png" type="image/png" />

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #171923;
      --muted: #718096;
      --line: #e2e8f0;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

html {
  overflow-y: scroll;
}

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .top-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    .tab-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 16px;
      background: white;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 900;
      transition: all .15s ease;
      box-shadow: 0 6px 18px rgba(15,23,42,.05);
    }

    .tab-btn:hover { transform: translateY(-1px); }

    .tab-btn.active {
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      color: white;
      border-color: transparent;
    }

   .hero{
  background:linear-gradient(135deg,#1d4ed8,#7c3aed);
  color:white;
  padding:28px;
  border-radius:24px;
  margin-bottom:20px;
  box-shadow:0 18px 40px rgba(37,99,235,.22);
  min-height:150px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

    .hero-title {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .hero-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 24px;
    }

    .hero p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
      opacity: .92;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(620px,1fr) minmax(620px,1fr);
      gap: 24px;
      align-items: start;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(15,23,42,.05);
      min-width: 0;
    }

    h2 { margin-top: 0; }

    label {
      display: block;
      font-weight: 800;
      margin: 14px 0 8px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      background: white;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      font-weight: 900;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .btn-light {
      background: #eef2ff;
      color: #3730a3;
    }

    .btn-full {
      width: 100%;
      margin-top: 14px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .toolbar > * { flex: 1; }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
    }

    .input-table {
      table-layout: fixed;
      min-width: 520px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: #475569;
    }

    td { overflow: hidden; }

    .input-table td:nth-child(1) { width: 42%; }
    .input-table td:nth-child(2) { width: 28%; }
    .input-table td:nth-child(3) { width: 30%; }

    .name-cell {
      font-weight: 900;
      word-break: break-all;
    }

    .score-input { width: 100%; }

    .pill {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ecfeff;
      color: #155e75;
      padding: 0 28px;
      border-radius: 999px;
      font-size: 24px;
      font-weight: 900;
      min-width: 120px;
      height: 72px;
      line-height: 1;
      white-space: nowrap;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .help {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .error {
      color: var(--danger);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 8px;
    }

    .ok {
      color: var(--success);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 8px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 26px 0;
      line-height: 1.6;
    }

    .special-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    .special-box {
      background: white;
      border-radius: 18px;
      padding: 16px;
      border: 1px solid var(--line);
    }

    .special-box.first {
      background: #fffbeb;
      border-color: #fde68a;
    }

    .special-box.last {
      background: #fff7ed;
      border-color: #fed7aa;
    }

    .special-title {
      font-size: 13px;
      font-weight: 900;
      color: #475569;
      margin-bottom: 6px;
    }

    .special-name {
      font-size: 20px;
      font-weight: 900;
    }

    .special-score {
      margin-top: 4px;
      color: var(--muted);
      font-weight: 800;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    .team-box {
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .team-box h3 {
      margin: 0 0 14px;
      min-height: 28px;
      display: flex;
      align-items: center;
    }

    .team-box .winner-label { margin-bottom: 10px; }

    .team-box:not(.winner)::before {
      content: "";
      display: block;
      height: 31px;
      margin-bottom: 10px;
    }

    .winner {
      border-color: #86efac;
      box-shadow: 0 0 0 4px rgba(22,163,74,.12);
    }

    .winner-label {
      display: inline-flex;
      background: #dcfce7;
      color: #166534;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .team-total {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .member-list {
      line-height: 1.8;
      color: #334155;
      font-size: 14px;
    }

    .result-card {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-top: 14px;
    }

    @media (max-width: 920px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 24px;
      }

      .hero-logo {
        width: 48px;
        height: 48px;
      }

      .result-grid,
      .special-grid {
        grid-template-columns: 1fr;
      }
    }
    .hero {
  position: relative;
  overflow: hidden;
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero-side-image {
  position: absolute;
  right: 24px;
  bottom: 0;
  height: 100%;
  max-height: 130px;
  object-fit: contain;
  z-index: 1;
  opacity: 0.95;
  pointer-events: none;
}
.footer{
  margin-top:8px;
  padding:28px 20px 40px;
  text-align:center;
  color:#94a3b8;
}

.footer-copy{
  font-size:13px;
  margin-bottom:2px;
}

.footer-links{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
}

.footer-icon{
  text-decoration:none;
}

.footer-icon img{
  height:32px;
  width:auto;
  object-fit:contain;
  display:block;
}
  </style>
</head>

<body>

<div class="wrap">

<div class="top-tabs">
  <a href="./index.html" class="tab-btn active">
    덕몽어스
  </a>

  <a href="./rating.html" class="tab-btn">
    캄푸평점
  </a>

  <a href="./suttda.html" class="tab-btn">
    스타 게이머 섯다
  </a>
</div>

<section class="hero">
  <div class="hero-content">
    <div class="hero-title">
      <img
        class="hero-logo"
        src="https://i.namu.wiki/i/2MezOuRVaXA9wmpXfo_cRrZOgYwVNV3RCshjTkarjhpvR0JdlBF6CREXT_3tnRVgYVewwGNcW-ysl2fRs0VGWk50WgH7z6iTN5VHxzNzkiWl1-Qoame_PUvi6WnPGHbU65L3xH_aogqOQuEULPhz1A.webp"
        alt="로고"
      />

      <h1>덕몽어스 계산기</h1>
    </div>

    <p>
      참가자 이름 등록 → 게임 진행 → 점수 입력 → 핀볼 순서 입력 후 팀 합계를 계산합니다.
    </p>
      </div>

<img
  class="hero-side-image"
  src="./goose.png"
  alt="덕몽어스 이미지"
/>
  </section>

  <div class="grid">

    <section class="card">
      <div class="section-head">
        <h2>참가자 등록</h2>

        <span id="countPill" class="pill">
          0명
        </span>
      </div>

      <label for="personName">
        참가자 이름
      </label>

      <input
        id="personName"
        placeholder="예) 마토"
        autocomplete="off"
      />

      <button
        class="btn-primary btn-full"
        onclick="addPerson()"
      >
        참가자 추가하기
      </button>

      <div id="addError" class="error"></div>

      <h2 style="margin-top:28px;">
        점수 입력
      </h2>

      <p class="help">
        게임 종료 후 각 참가자의 점수를 입력해주세요.
      </p>

      <div id="personArea"></div>

      <div class="toolbar">
        <button
          class="btn-light"
          onclick="downloadCSV()"
        >
          CSV 다운로드
        </button>

        <button
          class="btn-danger"
          onclick="resetAll()"
        >
          전체 초기화
        </button>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
     <h2>게임 결과</h2>

  <button
    class="btn-light"
    type="button"
    onclick="window.open('https://bluedell.com/%ED%95%80%EB%B3%BC-%EB%9E%9C%EB%8D%A4-%EC%88%AB%EC%9E%90-%EB%BD%91%EA%B8%B0-%EA%B3%B5%EB%BD%91%EA%B8%B0/', '_blank')"
  >
    핀볼 게임 열기
  </button>
</div>

      <div id="specialArea"></div>
      <div id="tieSelectArea"></div>

      <label for="pinballOrder">
        핀볼 순서 입력
      </label>

      <textarea
        id="pinballOrder"
        placeholder="예) 마토, 윤환, 치리, 타밍"
      ></textarea>

      <p class="help">
        최종 1등과 최종 꼴등을 제외한 참가자 이름만 입력해주세요.
      </p>

      <button
        class="btn-success btn-full"
        onclick="calculateTeams()"
      >
        팀 합계 계산하기
      </button>

      <div id="calcMessage" class="ok"></div>

      <div id="resultArea"></div>
    </section>

  </div>
</div>

<script>
const STORAGE_KEY = "duckmong-us-v1";

let people = loadPeople();

function loadPeople() {
  try {
    return JSON.parse(
      localStorage.getItem(STORAGE_KEY)
    ) || [];
  } catch {
    return [];
  }
}

function savePeople() {
  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(people)
  );
}

function escapeHTML(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function addPerson() {
  const input = document.getElementById("personName");
  const error = document.getElementById("addError");

  const name = input.value.trim();

  if (!name) {
    error.textContent = "참가자 이름을 입력해주세요.";
    return;
  }

  if (people.some(p => p.name === name)) {
    error.textContent = "이미 등록된 참가자입니다.";
    return;
  }

  people.push({
    id: Date.now(),
    name,
    score: ""
  });

  savePeople();

  input.value = "";
  error.textContent = "";

  renderPeople();
  renderSpecial();

input.focus();
}

function updateScore(id, value) {
  const person = people.find(p => p.id === id);

  if (person) {
    person.score = value;
    savePeople();
  }

  renderSpecial();

  document.getElementById("resultArea").innerHTML = "";

  document.getElementById("calcMessage").textContent = "";
}

function deletePerson(id) {
  if (!confirm("삭제할까요?")) {
    return;
  }

  people = people.filter(p => p.id !== id);

  savePeople();

  renderPeople();
  renderSpecial();

  document.getElementById("resultArea").innerHTML = "";

  document.getElementById("calcMessage").textContent = "";
}

function getValidPeople() {
  return people
    .filter(p =>
      p.score !== "" &&
      !isNaN(Number(p.score))
    )
    .map(p => ({
      ...p,
      score: Number(p.score)
    }));
}

function getRanking() {
  const valid = getValidPeople();

  return [...valid].sort((a,b) => {
    if (b.score !== a.score) {
      return b.score - a.score;
    }

    return a.name.localeCompare(
      b.name,
      "ko"
    );
  });
}

function renderPeople() {
  const area = document.getElementById("personArea");

  document.getElementById("countPill").textContent =
    `${people.length}명`;

  if (!people.length) {
    area.innerHTML = `
      <div class="empty">
        아직 등록된 참가자가 없습니다.
      </div>
    `;
    return;
  }

  const rows = people.map(person => `
    <tr>
      <td class="name-cell">
        ${escapeHTML(person.name)}
      </td>

      <td>
        <input
          class="score-input"
          type="number"
          value="${escapeHTML(person.score)}"
          placeholder="점수"
          oninput="updateScore(${person.id}, this.value)"
        />
      </td>

      <td>
        <button
          class="btn-danger"
          onclick="deletePerson(${person.id})"
        >
          삭제
        </button>
      </td>
    </tr>
  `).join("");

  area.innerHTML = `
    <div class="table-scroll">
      <table class="input-table">
        <thead>
          <tr>
            <th>참가자</th>
            <th>점수</th>
            <th>관리</th>
          </tr>
        </thead>

        <tbody>
          ${rows}
        </tbody>
      </table>
    </div>
  `;
}

function renderSpecial() {
  const area = document.getElementById("specialArea");
  const tieArea = document.getElementById("tieSelectArea");

  const ranking = getRanking();

  tieArea.innerHTML = "";

  if (
    ranking.length !== people.length ||
    people.length < 2
  ) {
    area.innerHTML = `
      <div class="empty">
        모든 참가자의 점수를 입력하면
        1등과 꼴등이 표시됩니다.
      </div>
    `;
    return;
  }

  const topScore = ranking[0].score;
  const bottomScore = ranking[ranking.length - 1].score;

  const firstList = ranking.filter(p => p.score === topScore);
  const lastList = ranking.filter(p => p.score === bottomScore);

  area.innerHTML = `
    <div class="special-grid">
      <div class="special-box first">
        <div class="special-title">
          1등 후보
        </div>

        <div class="special-name">
          ${firstList.map(p => escapeHTML(p.name)).join("<br />")}
        </div>

        <div class="special-score">
          ${topScore}점
        </div>
      </div>

      <div class="special-box last">
        <div class="special-title">
          꼴등 후보
        </div>

        <div class="special-name">
          ${lastList.map(p => escapeHTML(p.name)).join("<br />")}
        </div>

        <div class="special-score">
          ${bottomScore}점
        </div>
      </div>
    </div>
  `;

  if (topScore === bottomScore) {
    tieArea.innerHTML = `
      <div class="result-card">
        모든 점수가 같으면 최종 1등과 꼴등을 구분할 수 없습니다.
      </div>
    `;
    return;
  }

  const firstOptions = firstList.map(p => `
    <option value="${p.id}">
      ${escapeHTML(p.name)}
    </option>
  `).join("");

  const lastOptions = lastList.map(p => `
    <option value="${p.id}">
      ${escapeHTML(p.name)}
    </option>
  `).join("");

  tieArea.innerHTML = `
    <div class="result-card">
      <label for="selectedFirst">
        최종 1등은?
      </label>

      <select id="selectedFirst">
        ${firstOptions}
      </select>

      <label for="selectedLast" style="margin-top:14px;">
        최종 꼴등은?
      </label>

      <select id="selectedLast">
        ${lastOptions}
      </select>
    </div>
  `;
}

function parseOrder(text) {
  return String(text || "")
    .split(",")
    .map(v => v.trim())
    .filter(Boolean);
}

function calculateTeams() {
  const message = document.getElementById("calcMessage");

  message.className = "error";
  message.textContent = "";

  if (people.length < 4) {
    message.textContent = "최소 4명 이상 필요합니다.";
    return;
  }

  if (people.length % 2 !== 0) {
    message.textContent = "참가자 수는 짝수여야 합니다.";
    return;
  }

  const ranking = getRanking();

  if (ranking.length !== people.length) {
    message.textContent = "모든 참가자의 점수를 입력해주세요.";
    return;
  }

  const topScore = ranking[0].score;
  const bottomScore = ranking[ranking.length - 1].score;

  if (topScore === bottomScore) {
    message.textContent =
      "모든 점수가 같으면 1등과 꼴등을 구분할 수 없습니다.";
    return;
  }

  const firstCandidates =
    ranking.filter(p => p.score === topScore);

  const lastCandidates =
    ranking.filter(p => p.score === bottomScore);

  let first = firstCandidates[0];
  let last = lastCandidates[0];

  const firstSelect = document.getElementById("selectedFirst");
  const lastSelect = document.getElementById("selectedLast");

  if (firstSelect) {
    first = ranking.find(
      p => p.id === Number(firstSelect.value)
    );
  }

  if (lastSelect) {
    last = ranking.find(
      p => p.id === Number(lastSelect.value)
    );
  }

  if (!first || !last) {
    message.textContent =
      "최종 1등과 꼴등을 선택해주세요.";
    return;
  }

  if (first.id === last.id) {
    message.textContent =
      "1등과 꼴등이 같은 사람일 수 없습니다.";
    return;
  }

  const remaining =
    ranking.filter(p => {
      return (
        p.id !== first.id &&
        p.id !== last.id
      );
    });

  const orderNames =
    parseOrder(
      document.getElementById("pinballOrder").value
    );

  if (orderNames.length !== remaining.length) {
    message.textContent =
      `핀볼 순서는 ${remaining.length}명을 입력해야 합니다. 현재 ${orderNames.length}명 입력되었습니다.`;
    return;
  }

  const map =
    new Map(
      remaining.map(p => [p.name, p])
    );

  const used = new Set();

  for (const name of orderNames) {
    if (!map.has(name)) {
      message.textContent =
        `"${name}"은 핀볼 대상자가 아닙니다.`;
      return;
    }

    if (used.has(name)) {
      message.textContent =
        `"${name}"이 중복 입력되었습니다.`;
      return;
    }

    used.add(name);
  }

  const ordered =
    orderNames.map(name => map.get(name));

  const oddTeam = [];
  const evenTeam = [];

  ordered.forEach((person, index) => {
    if (index % 2 === 0) {
      oddTeam.push(person);
    } else {
      evenTeam.push(person);
    }
  });

  const oddTotal =
    oddTeam.reduce(
      (sum,p) => sum + p.score,
      0
    );

  const evenTotal =
    evenTeam.reduce(
      (sum,p) => sum + p.score,
      0
    );

  let winner = "무승부";

  if (oddTotal > evenTotal) {
    winner = "홀팀";
  }

  if (evenTotal > oddTotal) {
    winner = "짝팀";
  }



  message.className = "ok";
  message.textContent = "계산 완료!";

  renderResult({
    first,
    last,
    oddTeam,
    evenTeam,
    oddTotal,
    evenTotal,
    winner
  });
}

function renderMemberList(team) {
  if (!team.length) {
    return "-";
  }

  return team.map(person => {
    return `
      ${escapeHTML(person.name)}
      (${person.score}점)
    `;
  }).join("<br />");
}

function renderResult(result) {
  const oddWin = result.winner === "홀팀";
  const evenWin = result.winner === "짝팀";

  document.getElementById("resultArea").innerHTML = `
    <div class="special-grid">
      <div class="special-box first">
        <div class="special-title">
          최종 1등
        </div>

        <div class="special-name">
          ${escapeHTML(result.first.name)}
        </div>

        <div class="special-score">
          ${result.first.score}점
        </div>
      </div>

      <div class="special-box last">
        <div class="special-title">
          최종 꼴등
        </div>

        <div class="special-name">
          ${escapeHTML(result.last.name)}
        </div>

        <div class="special-score">
          ${result.last.score}점
        </div>
      </div>
    </div>

    <div class="result-grid">
      <div class="team-box ${oddWin ? "winner" : ""}">
        ${oddWin
          ? '<div class="winner-label">승리팀</div>'
          : ""
        }

        <h3>홀팀</h3>

        <div class="team-total">
          ${result.oddTotal}점
        </div>

        <div class="member-list">
          ${renderMemberList(result.oddTeam)}
        </div>
      </div>

      <div class="team-box ${evenWin ? "winner" : ""}">
        ${evenWin
          ? '<div class="winner-label">승리팀</div>'
          : ""
        }

        <h3>짝팀</h3>

        <div class="team-total">
          ${result.evenTotal}점
        </div>

        <div class="member-list">
          ${renderMemberList(result.evenTeam)}
        </div>
      </div>
    </div>

    <div class="result-card">
      <strong>최종 결과:</strong>
      ${
        result.winner === "무승부"
          ? "홀팀과 짝팀이 무승부입니다."
          : `${result.winner}이 승리했습니다.`
      }
    </div>
  `;
}

function downloadCSV() {
  const lines = [
    ["이름","점수"].join(",")
  ];

  people.forEach(person => {
    lines.push([
      `"${person.name}"`,
      person.score
    ].join(","));
  });

  const blob =
    new Blob(
      ['\ufeff' + lines.join('\n')],
      {
        type:
          'text/csv;charset=utf-8;'
      }
    );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;
  a.download = "duckmong-result.csv";
  a.click();

  URL.revokeObjectURL(url);
}

function resetAll() {
  if (!confirm("전체 초기화할까요?")) {
    return;
  }

  people = [];

  localStorage.removeItem(STORAGE_KEY);

  document.getElementById("pinballOrder").value = "";
  document.getElementById("resultArea").innerHTML = "";
  document.getElementById("specialArea").innerHTML = "";
  document.getElementById("tieSelectArea").innerHTML = "";
  document.getElementById("calcMessage").textContent = "";
  document.getElementById("resultPill").textContent = "계산 전";

  renderPeople();
  renderSpecial();
}

document
  .getElementById("personName")
  .addEventListener(
    "keydown",
    event => {
      if (event.key === "Enter") {
        addPerson();
      }
    }
  );

renderPeople();
renderSpecial();
</script>
